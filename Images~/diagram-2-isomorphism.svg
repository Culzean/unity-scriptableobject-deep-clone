<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 360" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrGray2" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 z" fill="#495057"/>
    </marker>
    <marker id="arrRed2" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 z" fill="#c92a2a"/>
    </marker>
    <marker id="arrTeal2" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 z" fill="#0b7285"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="900" height="360" fill="#ffffff"/>

  <!-- dividers -->
  <line x1="300" y1="20" x2="300" y2="330" stroke="#dee2e6" stroke-width="1"/>
  <line x1="600" y1="20" x2="600" y2="330" stroke="#dee2e6" stroke-width="1"/>

  <!-- Panel titles -->
  <text x="150" y="38" text-anchor="middle" font-size="16" font-weight="bold" fill="#212529">Original</text>
  <text x="450" y="38" text-anchor="middle" font-size="16" font-weight="bold" fill="#212529">Naive recursive copy</text>
  <text x="750" y="38" text-anchor="middle" font-size="16" font-weight="bold" fill="#212529">Deep Clone</text>

  <!-- ===== Panel 1: Original ===== -->
  <rect x="45" y="70" width="80" height="38" rx="4" fill="#f8f9fa" stroke="#495057" stroke-width="1.5"/>
  <text x="85" y="94" text-anchor="middle" font-size="13" fill="#212529">A</text>
  <rect x="175" y="70" width="80" height="38" rx="4" fill="#f8f9fa" stroke="#495057" stroke-width="1.5"/>
  <text x="215" y="94" text-anchor="middle" font-size="13" fill="#212529">B</text>

  <rect x="110" y="190" width="80" height="38" rx="4" fill="#f8f9fa" stroke="#495057" stroke-width="1.5"/>
  <text x="150" y="214" text-anchor="middle" font-size="13" fill="#212529">SharedC</text>

  <line x1="95" y1="108" x2="138" y2="186" stroke="#495057" stroke-width="1.5" marker-end="url(#arrGray2)"/>
  <line x1="205" y1="108" x2="162" y2="186" stroke="#495057" stroke-width="1.5" marker-end="url(#arrGray2)"/>

  <text x="150" y="280" text-anchor="middle" font-size="12.5" fill="#495057">one asset,</text>
  <text x="150" y="297" text-anchor="middle" font-size="12.5" fill="#495057">referenced twice</text>

  <!-- ===== Panel 2: Naive copy ===== -->
  <rect x="345" y="70" width="80" height="38" rx="4" fill="#fff5f5" stroke="#c92a2a" stroke-width="1.5"/>
  <text x="385" y="94" text-anchor="middle" font-size="13" fill="#212529">A'</text>
  <rect x="475" y="70" width="80" height="38" rx="4" fill="#fff5f5" stroke="#c92a2a" stroke-width="1.5"/>
  <text x="515" y="94" text-anchor="middle" font-size="13" fill="#212529">B'</text>

  <rect x="345" y="190" width="80" height="38" rx="4" fill="#fff5f5" stroke="#c92a2a" stroke-width="1.5"/>
  <text x="385" y="214" text-anchor="middle" font-size="13" fill="#212529">C copy 1</text>
  <rect x="475" y="190" width="80" height="38" rx="4" fill="#fff5f5" stroke="#c92a2a" stroke-width="1.5"/>
  <text x="515" y="214" text-anchor="middle" font-size="13" fill="#212529">C copy 2</text>

  <line x1="385" y1="108" x2="385" y2="186" stroke="#c92a2a" stroke-width="1.5" marker-end="url(#arrRed2)"/>
  <line x1="515" y1="108" x2="515" y2="186" stroke="#c92a2a" stroke-width="1.5" marker-end="url(#arrRed2)"/>

  <text x="450" y="280" text-anchor="middle" font-size="12.5" fill="#c92a2a">shared asset duplicated per referencer:</text>
  <text x="450" y="297" text-anchor="middle" font-size="12.5" fill="#c92a2a">same contents, wrong shape</text>

  <!-- ===== Panel 3: Deep Clone ===== -->
  <rect x="645" y="70" width="80" height="38" rx="4" fill="#e3fafc" stroke="#0b7285" stroke-width="1.5"/>
  <text x="685" y="94" text-anchor="middle" font-size="13" fill="#212529">A'</text>
  <rect x="775" y="70" width="80" height="38" rx="4" fill="#e3fafc" stroke="#0b7285" stroke-width="1.5"/>
  <text x="815" y="94" text-anchor="middle" font-size="13" fill="#212529">B'</text>

  <rect x="710" y="190" width="80" height="38" rx="4" fill="#e3fafc" stroke="#0b7285" stroke-width="1.5"/>
  <text x="750" y="214" text-anchor="middle" font-size="13" fill="#212529">SharedC'</text>

  <line x1="695" y1="108" x2="738" y2="186" stroke="#0b7285" stroke-width="1.5" marker-end="url(#arrTeal2)"/>
  <line x1="805" y1="108" x2="762" y2="186" stroke="#0b7285" stroke-width="1.5" marker-end="url(#arrTeal2)"/>

  <text x="750" y="280" text-anchor="middle" font-size="12.5" fill="#0b7285">cloned once, referenced twice:</text>
  <text x="750" y="297" text-anchor="middle" font-size="12.5" fill="#0b7285">isomorphic to the original</text>
</svg>
