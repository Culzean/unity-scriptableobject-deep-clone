<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 430" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrStep" markerWidth="9" markerHeight="9" refX="8" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 z" fill="#868e96"/>
    </marker>
    <marker id="arrTeal3" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 z" fill="#0b7285"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="960" height="430" fill="#ffffff"/>

  <!-- Stage titles -->
  <text x="120" y="36" text-anchor="middle" font-size="14" font-weight="bold" fill="#212529">1. Instantiate</text>
  <text x="360" y="36" text-anchor="middle" font-size="14" font-weight="bold" fill="#212529">2. Capture</text>
  <text x="600" y="36" text-anchor="middle" font-size="14" font-weight="bold" fill="#212529">3. Unpack completely</text>
  <text x="840" y="36" text-anchor="middle" font-size="14" font-weight="bold" fill="#212529">4. Rebuild</text>

  <!-- Step arrows between stages -->
  <line x1="212" y1="180" x2="262" y2="180" stroke="#868e96" stroke-width="2" marker-end="url(#arrStep)"/>
  <line x1="452" y1="180" x2="502" y2="180" stroke="#868e96" stroke-width="2" marker-end="url(#arrStep)"/>
  <line x1="692" y1="180" x2="742" y2="180" stroke="#868e96" stroke-width="2" marker-end="url(#arrStep)"/>

  <!-- ===== Stage 1: intact nested prefab in scene ===== -->
  <rect x="40" y="60" width="160" height="240" rx="6" fill="none" stroke="#4263eb" stroke-width="2"/>
  <text x="120" y="82" text-anchor="middle" font-size="12" fill="#4263eb">Root (prefab instance)</text>

  <rect x="58" y="100" width="124" height="34" rx="4" fill="#f8f9fa" stroke="#495057" stroke-width="1.2"/>
  <text x="120" y="122" text-anchor="middle" font-size="12" fill="#212529">Body</text>

  <rect x="58" y="150" width="124" height="90" rx="5" fill="#edf2ff" stroke="#4263eb" stroke-width="1.6"/>
  <text x="120" y="172" text-anchor="middle" font-size="12" fill="#4263eb">Turret</text>
  <text x="120" y="188" text-anchor="middle" font-size="10.5" fill="#4263eb">(nested instance</text>
  <text x="120" y="202" text-anchor="middle" font-size="10.5" fill="#4263eb">of a variant)</text>
  <rect x="74" y="210" width="92" height="22" rx="3" fill="#ffffff" stroke="#748ffc" stroke-width="1"/>
  <text x="120" y="225" text-anchor="middle" font-size="10.5" fill="#495057">Barrel</text>

  <text x="120" y="330" text-anchor="middle" font-size="11.5" fill="#495057">live scene instance</text>
  <text x="120" y="346" text-anchor="middle" font-size="11.5" fill="#495057">is the workspace</text>

  <!-- ===== Stage 2: capture nestedInfos ===== -->
  <rect x="280" y="60" width="160" height="240" rx="6" fill="none" stroke="#adb5bd" stroke-width="1.4" stroke-dasharray="6,4"/>
  <text x="360" y="82" text-anchor="middle" font-size="12" fill="#868e96">before touching anything</text>

  <rect x="296" y="104" width="128" height="150" rx="4" fill="#fff9db" stroke="#e67700" stroke-width="1.4"/>
  <text x="360" y="126" text-anchor="middle" font-size="12" font-weight="bold" fill="#212529">NestedPrefabInfo</text>
  <text x="308" y="150" font-size="11" fill="#495057" font-family="monospace">sourcePrefab</text>
  <text x="308" y="168" font-size="11" fill="#495057" font-family="monospace">parent</text>
  <text x="308" y="186" font-size="11" fill="#495057" font-family="monospace">siblingIndex</text>
  <text x="308" y="204" font-size="11" fill="#495057" font-family="monospace">localTransform</text>
  <text x="308" y="222" font-size="11" fill="#495057" font-family="monospace">name</text>

  <text x="360" y="330" text-anchor="middle" font-size="11.5" fill="#e67700">recorded first: unpacking</text>
  <text x="360" y="346" text-anchor="middle" font-size="11.5" fill="#e67700">destroys this information</text>

  <!-- ===== Stage 3: unpacked flat ===== -->
  <rect x="520" y="60" width="160" height="240" rx="6" fill="none" stroke="#adb5bd" stroke-width="1.4"/>
  <text x="600" y="82" text-anchor="middle" font-size="12" fill="#868e96">plain GameObjects</text>

  <rect x="538" y="100" width="124" height="34" rx="4" fill="#f1f3f5" stroke="#adb5bd" stroke-width="1.2"/>
  <text x="600" y="122" text-anchor="middle" font-size="12" fill="#495057">Root</text>
  <rect x="538" y="150" width="124" height="34" rx="4" fill="#f1f3f5" stroke="#adb5bd" stroke-width="1.2"/>
  <text x="600" y="172" text-anchor="middle" font-size="12" fill="#495057">Body</text>
  <rect x="538" y="200" width="124" height="34" rx="4" fill="#f1f3f5" stroke="#adb5bd" stroke-width="1.2"/>
  <text x="600" y="222" text-anchor="middle" font-size="12" fill="#495057">Turret</text>
  <rect x="538" y="250" width="124" height="34" rx="4" fill="#f1f3f5" stroke="#adb5bd" stroke-width="1.2"/>
  <text x="600" y="272" text-anchor="middle" font-size="12" fill="#495057">Barrel</text>

  <text x="600" y="330" text-anchor="middle" font-size="11.5" fill="#495057">every nesting link severed:</text>
  <text x="600" y="346" text-anchor="middle" font-size="11.5" fill="#495057">now safe to operate on</text>

  <!-- ===== Stage 4: rebuilt with clones ===== -->
  <rect x="760" y="60" width="160" height="240" rx="6" fill="none" stroke="#0b7285" stroke-width="2"/>
  <text x="840" y="82" text-anchor="middle" font-size="12" fill="#0b7285">Root* (new prefab asset)</text>

  <rect x="778" y="100" width="124" height="34" rx="4" fill="#f8f9fa" stroke="#495057" stroke-width="1.2"/>
  <text x="840" y="122" text-anchor="middle" font-size="12" fill="#212529">Body</text>

  <rect x="778" y="150" width="124" height="90" rx="5" fill="#e3fafc" stroke="#0b7285" stroke-width="1.6"/>
  <text x="840" y="172" text-anchor="middle" font-size="12" fill="#0b7285">Turret*</text>
  <text x="840" y="188" text-anchor="middle" font-size="10.5" fill="#0b7285">(instance of the</text>
  <text x="840" y="202" text-anchor="middle" font-size="10.5" fill="#0b7285">cloned variant)</text>
  <rect x="794" y="210" width="92" height="22" rx="3" fill="#ffffff" stroke="#66d9e8" stroke-width="1"/>
  <text x="840" y="225" text-anchor="middle" font-size="10.5" fill="#495057">Barrel</text>

  <text x="840" y="330" text-anchor="middle" font-size="11.5" fill="#0b7285">sources cloned recursively,</text>
  <text x="840" y="346" text-anchor="middle" font-size="11.5" fill="#0b7285">children complete before</text>
  <text x="840" y="362" text-anchor="middle" font-size="11.5" fill="#0b7285">parents save</text>

  <!-- bottom caption -->
  <text x="480" y="410" text-anchor="middle" font-size="13" fill="#212529" font-style="italic">To clone the structure, first destroy it.</text>
</svg>
